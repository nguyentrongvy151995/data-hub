spring.application.name=data-hub
server.port=8084
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

# ----------------------------
# MongoDB (externalized)
# ----------------------------
spring.data.mongodb.uri=${MONGODB_URI:mongodb://datahub:datahub@localhost:27017/data_hub?authSource=admin}
spring.data.mongodb.auto-index-creation=${MONGODB_AUTO_INDEX_CREATION:true}

# ----------------------------
# Kafka consumer
# ----------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:data-hub-consumer}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=${KAFKA_CONCURRENCY:4}

# ----------------------------
# Application-specific
# ----------------------------
app.kafka.topic.raw-events=${APP_KAFKA_TOPIC_RAW_EVENTS:data-hub.raw-events}
app.security.admin.username=${APP_ADMIN_USERNAME:admin}
app.security.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.security.report.username=${APP_REPORT_USERNAME:reporter}
app.security.report.password=${APP_REPORT_PASSWORD:report123}

app.kafka.listener.enabled=${APP_KAFKA_LISTENER_ENABLED:false}
