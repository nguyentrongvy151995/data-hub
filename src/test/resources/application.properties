spring.mongodb.uri=mongodb://localhost:27017/data_hub_test
spring.data.mongodb.auto-index-creation=false
spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false
app.kafka.topic.raw-events=test.raw-events
app.kafka.topic.raw-events-dlt=test.raw-events.DLT
app.kafka.topic.raw-events.partitions=1
app.kafka.topic.raw-events.replicas=1
app.security.admin.username=admin
app.security.admin.password=admin123
app.security.report.username=reporter
app.security.report.password=report123

app.kafka.listener.enabled=false
app.kafka.producer.enabled=false
app.kafka.retry.max-attempts=2
app.kafka.retry.backoff-ms=0
app.kafka.producer.send-timeout-ms=1000
app.kafka.test.random-failure-enabled=false
app.kafka.test.random-failure-percent=0
spring.kafka.consumer.group-id=test-group
app.event.processing.timeout-ms=10000
