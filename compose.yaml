services:
  mongo:
    image: 'mongo:7'
    environment:
      - 'MONGO_INITDB_ROOT_USERNAME=datahub'
      - 'MONGO_INITDB_ROOT_PASSWORD=datahub'
      - 'MONGO_INITDB_DATABASE=data_hub'
    ports:
      - '27017:27017'

  kafka:
    image: 'bitnamilegacy/kafka:4.0.0-debian-12-r10'
    ports:
      - '9092:9092'
    environment:
      - 'KAFKA_CFG_NODE_ID=1'
      - 'KAFKA_CFG_PROCESS_ROLES=broker,controller'
      - 'KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER'
      - 'KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      - 'KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      - 'KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL'
      - 'KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      - 'KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093'
      - 'KAFKA_CFG_NUM_PARTITIONS=3'
      - 'KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1'
      - 'KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1'
      - 'KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1'
      - 'KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS=0'
      - 'KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true'
      - 'ALLOW_PLAINTEXT_LISTENER=yes'
    volumes:
      - 'kafka_data:/bitnami/kafka'

  kafka-ui:
    image: 'provectuslabs/kafka-ui:v0.7.2'
    depends_on:
      - kafka
    ports:
      - '18080:8080'
    environment:
      - 'KAFKA_CLUSTERS_0_NAME=local'
      - 'KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092'
      - 'DYNAMIC_CONFIG_ENABLED=true'

volumes:
  kafka_data:
